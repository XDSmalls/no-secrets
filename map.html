<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Map — No Secrets</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg:           #fbfaf6;
            --ink:          #0d0a08;
            --ink-2:        #221d18;
            --muted:        #5e544a;
            --accent:       #c43a2d;
            --accent-deep:  #8a261c;
            --pin-meal:     #c43a2d;
            --pin-snack:    #d97e1f;
            --pin-dessert:  #a23ca2;
            --line:         rgba(13,10,8,0.10);
            --line-soft:    rgba(13,10,8,0.05);
            --line-strong:  rgba(13,10,8,0.20);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--ink-2);
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }
        img { display: block; }

        /* NAV (unchanged) */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 1rem 2.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(251,250,246,0.95);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
            height: 76px;
        }
        .nav-logo { display: block; padding: 4px 0; }
        .nav-logo img {
            height: 72px;
            width: auto;
            display: block;
            mix-blend-mode: multiply;
            transition: transform 0.2s;
        }
        .nav-logo:hover img { transform: scale(1.04); }
        .nav-links { display: flex; align-items: center; gap: 2.2rem; list-style: none; }
        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--ink);
            opacity: 0.78;
            transition: opacity 0.2s, color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--accent); }
        .nav-divider { width: 1px; height: 14px; background: var(--line-strong); }
        .nav-off-menu a { display: block; padding: 4px 0; opacity: 1 !important; }
        .nav-off-menu img { height: 28px; width: auto; display: block; transition: transform 0.2s; }
        .nav-off-menu a:hover img { transform: scale(1.05); }
        .nav-menu-btn { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
        .nav-menu-btn span { display: block; width: 22px; height: 2px; background: var(--ink); }

        /* MAP HEADER ROW (was bottom card; now top bar) */
        .map-header {
            position: fixed;
            top: 76px;
            left: 0; right: 0;
            z-index: 800;
            background: rgba(251,250,246,0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
            padding: 0.85rem 1.6rem;
            display: flex;
            align-items: center;
            gap: 1.6rem;
            height: 64px;
        }
        .map-header .info { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
        .map-header .eyebrow {
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
        }
        .map-header h1 {
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -0.025em;
            line-height: 1;
        }
        .map-header .blurb {
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-style: italic;
            color: var(--muted);
            line-height: 1.4;
        }
        .map-header .key-toggle {
            margin-left: auto;
            font-family: 'Inter', sans-serif;
            font-size: 0.66rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--ink);
            background: transparent;
            border: 1px solid var(--line-strong);
            padding: 0.55rem 1rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }
        .map-header .key-toggle:hover {
            background: var(--ink);
            color: var(--bg);
            border-color: var(--ink);
        }
        .map-header .key-toggle .show-when-open { display: none; }
        .map-header .key-toggle.open .show-when-closed { display: none; }
        .map-header .key-toggle.open .show-when-open { display: inline; }

        /* MAP BODY: flex with map + sidebar */
        .map-body {
            position: fixed;
            top: 140px;        /* 76 nav + 64 header */
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
        }
        #map {
            position: relative;
            flex: 1;
            background: var(--bg);
        }
        .leaflet-tile-pane { filter: saturate(0.6) brightness(0.99) contrast(0.94); }
        .country-shape {
            stroke: #0d0a08;
            stroke-width: 1.2;
            stroke-opacity: 0.85;
            fill-opacity: 0;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        /* KEY PANEL (inside map, toggleable) */
        .key-panel {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 500;
            width: 240px;
            background: rgba(251,250,246,0.97);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--line);
            box-shadow: 0 12px 36px rgba(13,10,8,0.10);
            padding: 1rem 1.1rem 1rem;
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .key-panel.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .key-panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.7rem;
        }
        .key-panel-head h3 {
            font-family: 'Inter', sans-serif;
            font-size: 0.62rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
        }
        .key-close {
            font-size: 1.1rem;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            line-height: 1;
            padding: 0 0.2rem;
            transition: color 0.2s;
        }
        .key-close:hover { color: var(--ink); }
        .key-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            margin-bottom: 0.85rem;
        }
        .key-list li {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            color: var(--ink-2);
        }
        .pin-dot {
            width: 12px;
            height: 12px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            flex-shrink: 0;
        }
        .pin-dot.pin-meal    { background: var(--pin-meal); }
        .pin-dot.pin-snack   { background: var(--pin-snack); }
        .pin-dot.pin-dessert { background: var(--pin-dessert); }
        .key-shape { display: inline-block; flex-shrink: 0; }
        .key-shape.sq-red {
            width: 12px;
            height: 12px;
            background: #c43a2d;
        }
        .key-shape.tri-blue {
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 12px solid #2e76d6;
        }
        .key-note {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-style: italic;
            color: var(--muted);
            line-height: 1.5;
            padding-top: 0.7rem;
            border-top: 1px solid var(--line);
        }

        /* RIGHT SIDEBAR — hierarchical menu */
        .map-sidebar {
            width: 290px;
            flex-shrink: 0;
            background: rgba(251,250,246,0.98);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-left: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-head {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }
        .sidebar-head h3 {
            font-family: 'Inter', sans-serif;
            font-size: 0.62rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
        }
        .sidebar-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0.6rem 0;
        }
        .country-block {
            border-bottom: 1px solid var(--line-soft);
        }
        .country-block:last-child { border-bottom: none; }
        .country-block > summary,
        .city-block > summary {
            cursor: pointer;
            list-style: none;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            transition: color 0.2s;
        }
        .country-block > summary::-webkit-details-marker,
        .city-block > summary::-webkit-details-marker { display: none; }
        .country-block > summary::before,
        .city-block > summary::before {
            content: '▸';
            font-size: 0.65rem;
            color: var(--muted);
            transition: transform 0.2s;
            display: inline-block;
        }
        .country-block[open] > summary::before,
        .city-block[open] > summary::before { transform: rotate(90deg); }
        .country-block > summary {
            padding: 0.7rem 1.2rem;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink);
        }
        .country-block > summary:hover { color: var(--accent); }
        .city-block > summary {
            padding: 0.5rem 1.2rem 0.5rem 2rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--ink-2);
        }
        .city-block > summary:hover { color: var(--accent); }
        .cat-group {
            padding: 0.4rem 1.2rem 0.8rem 2.6rem;
        }
        .cat-group h4 {
            font-family: 'Inter', sans-serif;
            font-size: 0.58rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        .cat-group ul { list-style: none; }
        .cat-group li {
            padding: 0.18rem 0;
        }
        .cat-group a {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--ink-2);
            display: flex;
            align-items: center;
            gap: 0.55rem;
            transition: color 0.2s;
        }
        .cat-group a::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            flex-shrink: 0;
        }
        .cat-group .cat-meals   a::before { background: var(--pin-meal); }
        .cat-group .cat-snacks  a::before { background: var(--pin-snack); }
        .cat-group .cat-desserts a::before { background: var(--pin-dessert); }
        .cat-group a:hover { color: var(--accent); }
        .cat-group .empty {
            font-family: 'Inter', sans-serif;
            font-size: 0.74rem;
            font-style: italic;
            color: var(--muted);
            opacity: 0.7;
        }

        /* MARKER */
        .map-marker { cursor: pointer; transition: transform 0.2s; }
        .map-marker:hover { transform: scale(1.15) translateY(-2px); }

        /* POPUP OVERRIDES (unchanged from previous) */
        .leaflet-popup-content-wrapper {
            background: var(--bg) !important;
            border: 1px solid var(--line) !important;
            border-radius: 0 !important;
            box-shadow: 0 16px 48px rgba(13,10,8,0.18) !important;
            padding: 0 !important;
            overflow: hidden;
        }
        .leaflet-popup-tip-container { display: none !important; }
        .leaflet-popup-content { margin: 0 !important; width: 300px !important; }
        .leaflet-popup-close-button {
            color: var(--muted) !important;
            opacity: 0.7 !important;
            font-size: 1.2rem !important;
            padding: 8px 12px !important;
            top: 6px !important;
            right: 4px !important;
            z-index: 10;
            transition: opacity 0.2s, color 0.2s !important;
        }
        .leaflet-popup-close-button:hover { opacity: 1 !important; color: var(--accent) !important; }
        .popup-photo {
            width: 100%;
            height: 160px;
            background: linear-gradient(155deg, #d8c8a8 0%, #8a6a3a 100%);
            position: relative;
            overflow: hidden;
        }
        .popup-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .popup-photo-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .popup-photo-placeholder span {
            font-family: 'Inter', sans-serif;
            font-style: italic;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.78);
        }
        .popup-body { padding: 1.4rem 1.6rem 1.5rem; }
        .popup-city {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.45rem;
        }
        .popup-cat {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 0.56rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            border: 1px solid var(--line-strong);
            padding: 0.15em 0.5em;
            margin-bottom: 0.7rem;
            font-weight: 600;
        }
        .popup-name {
            font-family: 'Inter', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--ink);
            line-height: 1.2;
            letter-spacing: -0.025em;
            margin-bottom: 0.75rem;
        }
        .popup-writeup {
            font-family: 'Inter', sans-serif;
            font-size: 0.84rem;
            font-style: italic;
            color: var(--muted);
            line-height: 1.65;
        }

        .leaflet-bar { box-shadow: 0 8px 24px rgba(13,10,8,0.12) !important; border: 1px solid var(--line) !important; }
        .leaflet-bar a {
            background: rgba(251,250,246,0.96) !important;
            color: var(--ink) !important;
            border-bottom: 1px solid var(--line) !important;
            font-family: 'Inter', sans-serif !important;
        }
        .leaflet-bar a:hover { background: var(--bg) !important; color: var(--accent) !important; }
        .leaflet-marker-pane { opacity: 0; transition: opacity 0.8s ease; }
        .markers-ready .leaflet-marker-pane { opacity: 1; }

        /* RESPONSIVE */
        @media (max-width: 760px) {
            .nav { padding: 0.75rem 1.5rem; height: 60px; }
            .nav-logo img { height: 50px; }
            .nav-links {
                display: none;
                position: absolute; top: 100%; left: 0; right: 0;
                background: rgba(251,250,246,0.97);
                backdrop-filter: blur(14px);
                flex-direction: column;
                gap: 0;
                border-bottom: 1px solid var(--line);
                padding: 0;
            }
            .nav-links.open { display: flex; align-items: stretch; }
            .nav-links li { width: 100%; }
            .nav-links li a { display: block; padding: 1rem 1.5rem; text-align: center; }
            .nav-divider { display: none; }
            .nav-off-menu a { padding: 0.7rem 1.5rem; }
            .nav-off-menu img { margin: 0 auto; height: 26px; }
            .nav-menu-btn { display: flex; }
            .map-header {
                top: 60px;
                padding: 0.7rem 1rem;
                gap: 0.8rem;
                height: auto;
                flex-wrap: wrap;
            }
            .map-header h1 { font-size: 1.1rem; }
            .map-header .blurb { display: none; }
            .map-body { top: 130px; }
            .map-sidebar { width: 200px; }
            .key-panel { width: 200px; top: 0.6rem; left: 0.6rem; }
        }
    </style>
</head>
<body>

<nav class="nav" id="main-nav">
    <a href="index.html" class="nav-logo" aria-label="No Secrets — home"><img src="nosecretsfinal.png" alt="No Secrets"></a>
    <ul class="nav-links" id="nav-links">
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="writing.html">Writing</a></li>
        <li><a href="map.html" class="active">The Map</a></li>
        <li><a href="about.html">About</a></li>
        <li class="nav-divider" aria-hidden="true"></li>
        <li class="nav-off-menu"><a href="side-b/index.html"><img src="off-menu.png" alt="Off Menu"></a></li>
    </ul>
    <div class="nav-menu-btn" id="menu-btn">
        <span></span><span></span><span></span>
    </div>
</nav>

<header class="map-header">
    <div class="info">
        <span class="eyebrow">Personal recommendations</span>
        <h1>The Map</h1>
        <span class="blurb">The best joints I've eaten at across the globe.</span>
    </div>
    <button id="key-toggle" class="key-toggle open" type="button">
        <span class="show-when-closed">Show key</span>
        <span class="show-when-open">Hide key</span>
    </button>
</header>

<div class="map-body">
    <div id="map">
        <div id="key-panel" class="key-panel open" role="dialog" aria-label="Map key">
            <div class="key-panel-head">
                <h3>Key</h3>
                <button id="key-close" class="key-close" aria-label="Close key">×</button>
            </div>
            <ul class="key-list">
                <li><span class="key-shape sq-red" aria-hidden="true"></span> placeholder</li>
                <li><span class="key-shape tri-blue" aria-hidden="true"></span> placeholder</li>
            </ul>
            <p class="key-note">Filler key — to be replaced once the categories are set.</p>
        </div>
    </div>

    <aside class="map-sidebar">
        <header class="sidebar-head">
            <h3>Browse</h3>
        </header>
        <div class="sidebar-tree" id="sidebar-tree"></div>
    </aside>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// =====================================================================
//  RESTAURANTS — your personal recommendations
//
//  Each entry now has:
//    country   — top-level grouping in the sidebar
//    city      — second-level grouping
//    category  — "meals" | "snacks" | "desserts" (drives pin color)
//    coords    — [lat, lng]
//    writeup   — your personal note
//    photo     — image path or "" for a placeholder
// =====================================================================

const restaurants = [
    { name: "Da Enzo al 29", country: "Italy", city: "Rome", category: "meals",
      coords: [41.8879, 12.4777],
      writeup: "Replace this with your own note. What did you order? What made it memorable? Who were you with? This is your story to tell.",
      photo: "" },
    { name: "Figlmüller Bäckerstraße", country: "Austria", city: "Vienna", category: "meals",
      coords: [48.2082, 16.3738],
      writeup: "Replace this with your own note. What did you order? What made it memorable? Who were you with? This is your story to tell.",
      photo: "" },
    { name: "The Test Kitchen", country: "South Africa", city: "Cape Town", category: "meals",
      coords: [-33.9258, 18.4232],
      writeup: "Replace this with your own note. What did you order? What made it memorable? Who were you with? This is your story to tell.",
      photo: "" },
    { name: "Lola Bistro", country: "USA", city: "Cleveland", category: "meals",
      coords: [41.4993, -81.6944],
      writeup: "Replace this with your own note. What did you order? What made it memorable? Who were you with? This is your story to tell.",
      photo: "" },
    { name: "Abou El Sid", country: "Egypt", city: "Cairo", category: "meals",
      coords: [30.0626, 31.2497],
      writeup: "Replace this with your own note. What did you order? What made it memorable? Who were you with? This is your story to tell.",
      photo: "" },
];

const FLAG_MAP = {
    USA: 'us', ITA: 'it', AUT: 'at', GBR: 'gb-eng', SVK: 'sk',
    EGY: 'eg', ARE: 'ae', ZAF: 'za', IRL: 'ie'
};
const WANTED = new Set(Object.keys(FLAG_MAP));

const PIN_COLORS = {
    meals:    '#c43a2d',
    snacks:   '#d97e1f',
    desserts: '#a23ca2',
};

// =====================================================================
//  MAP
// =====================================================================

const map = L.map('map', {
    center: [25, 15],
    zoom: 2,
    zoomControl: false,
    attributionControl: true,
    minZoom: 2,
    maxBoundsViscosity: 0.8,
});
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" style="color:#c43a2d">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions" style="color:#c43a2d">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

const attribution = document.querySelector('.leaflet-control-attribution');
if (attribution) {
    attribution.style.cssText =
        'background: rgba(251,250,246,0.85); color: rgba(94,84,74,0.85); font-size: 0.6rem; font-family: Inter, sans-serif; border-top: 1px solid rgba(13,10,8,0.08); backdrop-filter: blur(8px); padding: 2px 8px;';
}

// =====================================================================
//  COUNTRY UNRAVEL + FLAG FILLS
// =====================================================================

const SVG_NS = 'http://www.w3.org/2000/svg';
const XLINK_NS = 'http://www.w3.org/1999/xlink';

fetch('https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json')
    .then(r => r.json())
    .then(world => {
        const filtered = {
            type: 'FeatureCollection',
            features: world.features.filter(f => WANTED.has(f.id))
        };

        const geoLayer = L.geoJSON(filtered, {
            style: () => ({
                className: 'country-shape',
                color: '#0d0a08',
                weight: 1.2,
                opacity: 0.85,
                fill: true,
                fillOpacity: 0
            })
        }).addTo(map);

        const svg = document.querySelector('.leaflet-overlay-pane svg');
        if (!svg) return;
        const defs = document.createElementNS(SVG_NS, 'defs');
        Object.entries(FLAG_MAP).forEach(([iso, code]) => {
            const pattern = document.createElementNS(SVG_NS, 'pattern');
            pattern.setAttribute('id', `flag-${code}`);
            pattern.setAttribute('patternUnits', 'objectBoundingBox');
            pattern.setAttribute('width', '1');
            pattern.setAttribute('height', '1');
            const image = document.createElementNS(SVG_NS, 'image');
            const url = `https://flagcdn.com/w640/${code}.png`;
            image.setAttribute('href', url);
            image.setAttributeNS(XLINK_NS, 'xlink:href', url);
            image.setAttribute('x', '0');
            image.setAttribute('y', '0');
            image.setAttribute('width', '1');
            image.setAttribute('height', '1');
            image.setAttribute('preserveAspectRatio', 'xMidYMid slice');
            pattern.appendChild(image);
            defs.appendChild(pattern);
        });
        svg.insertBefore(defs, svg.firstChild);

        geoLayer.eachLayer(layer => {
            const path = layer._path;
            const iso = layer.feature.id;
            const code = FLAG_MAP[iso];
            if (!path || !code) return;
            path.setAttribute('fill', `url(#flag-${code})`);

            let len = 0;
            try { len = path.getTotalLength(); } catch (e) { len = 5000; }
            path.style.strokeDasharray = len;
            path.style.strokeDashoffset = len;
            path.style.fillOpacity = '0';
            path.style.transition =
                'stroke-dashoffset 2.2s cubic-bezier(0.45, 0, 0.4, 1), fill-opacity 0.7s ease';
            requestAnimationFrame(() => {
                path.style.strokeDashoffset = '0';
                setTimeout(() => { path.style.fillOpacity = '0.78'; }, 1500);
            });
            setTimeout(() => {
                path.style.strokeDasharray = 'none';
                path.style.strokeDashoffset = '0';
                path.style.transition = 'fill-opacity 0.4s ease';
            }, 2400);
        });

        const reassertStyles = () => {
            geoLayer.eachLayer(layer => {
                const path = layer._path;
                const iso = layer.feature.id;
                const code = FLAG_MAP[iso];
                if (!path || !code) return;
                path.setAttribute('fill', `url(#flag-${code})`);
                path.style.strokeDasharray = 'none';
                path.style.strokeDashoffset = '0';
            });
        };
        map.on('zoomend moveend', () => setTimeout(reassertStyles, 50));

        setTimeout(() => document.body.classList.add('markers-ready'), 2400);
    })
    .catch(err => {
        console.warn('Country borders failed to load:', err);
        document.body.classList.add('markers-ready');
    });

// =====================================================================
//  PINS
// =====================================================================

function makeIcon(category) {
    const fill = PIN_COLORS[category] || PIN_COLORS.meals;
    return L.divIcon({
        className: 'map-marker',
        html: `<svg width="26" height="36" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg">
            <filter id="ms" x="-40%" y="-40%" width="180%" height="180%">
                <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,0.35)"/>
            </filter>
            <path d="M13 0C5.82 0 0 5.82 0 13c0 8.667 13 23 13 23S26 21.667 26 13C26 5.82 20.18 0 13 0z"
                  fill="${fill}" filter="url(#ms)"/>
            <circle cx="13" cy="13" r="4.5" fill="#fbfaf6"/>
        </svg>`,
        iconSize: [26, 36],
        iconAnchor: [13, 36],
        popupAnchor: [0, -40]
    });
}

function popupHTML(r) {
    const photoHTML = r.photo
        ? `<img src="${r.photo}" alt="${r.name}">`
        : `<div class="popup-photo-placeholder"><span>add a photo</span></div>`;
    const catLabel = r.category.charAt(0).toUpperCase() + r.category.slice(1);
    return `
        <div class="popup-photo">${photoHTML}</div>
        <div class="popup-body">
            <span class="popup-city">${r.city}, ${r.country}</span>
            <span class="popup-cat">${catLabel}</span>
            <div class="popup-name">${r.name}</div>
            <p class="popup-writeup">${r.writeup}</p>
        </div>
    `;
}

const markers = restaurants.map(r => {
    const marker = L.marker(r.coords, { icon: makeIcon(r.category) });
    marker.bindPopup(popupHTML(r), {
        maxWidth: 300,
        minWidth: 300,
        autoPanPaddingTopLeft: L.point(60, 160),
        autoPanPaddingBottomRight: L.point(60, 40),
    });
    marker.addTo(map);
    return marker;
});

// =====================================================================
//  SIDEBAR TREE (Country > City > Category > Restaurant)
// =====================================================================

function buildSidebar() {
    const tree = {};
    restaurants.forEach((r, i) => {
        tree[r.country] = tree[r.country] || {};
        tree[r.country][r.city] = tree[r.country][r.city] || { meals: [], snacks: [], desserts: [] };
        tree[r.country][r.city][r.category].push({ ...r, idx: i });
    });

    const container = document.getElementById('sidebar-tree');
    let html = '';
    Object.entries(tree).forEach(([country, cities]) => {
        html += `<details open class="country-block"><summary>${country}</summary>`;
        Object.entries(cities).forEach(([city, cats]) => {
            html += `<details open class="city-block"><summary>${city}</summary>`;
            ['meals', 'snacks', 'desserts'].forEach(cat => {
                if (cats[cat].length === 0) return;
                const catTitle = cat.charAt(0).toUpperCase() + cat.slice(1);
                html += `<div class="cat-group cat-${cat}"><h4>${catTitle}</h4><ul>`;
                cats[cat].forEach(r => {
                    html += `<li><a href="#" data-idx="${r.idx}">${r.name}</a></li>`;
                });
                html += `</ul></div>`;
            });
            html += `</details>`;
        });
        html += `</details>`;
    });
    container.innerHTML = html;

    container.addEventListener('click', e => {
        const a = e.target.closest('a[data-idx]');
        if (!a) return;
        e.preventDefault();
        const idx = parseInt(a.dataset.idx, 10);
        const marker = markers[idx];
        if (!marker) return;
        const targetZoom = Math.max(map.getZoom(), 7);
        map.flyTo(marker.getLatLng(), targetZoom, { duration: 0.9 });
        setTimeout(() => marker.openPopup(), 950);
    });
}
buildSidebar();

// =====================================================================
//  KEY TOGGLE
// =====================================================================

const keyPanel = document.getElementById('key-panel');
const keyToggle = document.getElementById('key-toggle');
keyToggle.addEventListener('click', () => {
    const open = keyPanel.classList.toggle('open');
    keyToggle.classList.toggle('open', open);
});
document.getElementById('key-close').addEventListener('click', () => {
    keyPanel.classList.remove('open');
    keyToggle.classList.remove('open');
});

//  MOBILE NAV
// =====================================================================

document.getElementById('menu-btn').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('open');
});

// Safety reveal in case GeoJSON fails
setTimeout(() => document.body.classList.add('markers-ready'), 4000);

</script>
