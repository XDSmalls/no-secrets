<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing — No Secrets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:           #fbfaf6;
            --bg-tint:      #f1ead8;
            --ink:          #0d0a08;
            --ink-2:        #221d18;
            --muted:        #5e544a;
            --accent:       #c43a2d;
            --accent-deep:  #8a261c;
            --line:         rgba(13,10,8,0.10);
            --line-soft:    rgba(13,10,8,0.05);
            --line-strong:  rgba(13,10,8,0.20);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--ink-2);
            overflow-x: hidden;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        .eyebrow {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
        }

        /* NAV */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(251,250,246,0.95);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }
        .nav-logo { display: block; padding: 4px 0; }
        .nav-logo img {
            height: 72px;
            width: auto;
            display: block;
            mix-blend-mode: multiply;
            transition: transform 0.2s;
        }
        .nav-logo:hover img { transform: scale(1.04); }
        .nav-links { display: flex; align-items: center; gap: 2.2rem; list-style: none; }
        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--ink);
            opacity: 0.78;
            transition: opacity 0.2s, color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--accent); }
        .nav-divider { width: 1px; height: 14px; background: var(--line-strong); }
        .nav-off-menu a { display: block; padding: 4px 0; opacity: 1 !important; }
        .nav-off-menu img {
            height: 28px;
            width: auto;
            display: block;
            transition: transform 0.2s;
        }
        .nav-off-menu a:hover img { transform: scale(1.05); }
        .nav-menu-btn { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
        .nav-menu-btn span { display: block; width: 22px; height: 2px; background: var(--ink); }

        /* HEADER */
        .page-header {
            padding: 9rem 3rem 4rem;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .page-header .eyebrow { margin-bottom: 1.3rem; }
        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: clamp(3rem, 7.5vw, 5.6rem);
            font-weight: 800;
            color: var(--ink);
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 1.4rem;
        }
        .page-title em {
            font-weight: 500;
            font-style: italic;
            color: var(--accent);
        }
        .page-desc {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1rem, 1.7vw, 1.15rem);
            font-style: italic;
            color: var(--muted);
            line-height: 1.75;
            max-width: 520px;
            margin: 0 auto;
        }
        .page-rule {
            max-width: 60px;
            height: 1px;
            background: var(--accent);
            margin: 2.4rem auto 0;
            opacity: 0.6;
        }

        /* ARCHIVE */
        .archive {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 2rem 6rem;
        }
        .year-block { margin-bottom: 4.5rem; }
        .year-head {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.9rem, 3.8vw, 2.6rem);
            font-weight: 800;
            color: rgba(13,10,8,0.32);
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 1.8rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--line);
        }
        .post-list { list-style: none; }
        .post {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 2rem;
            padding: 1.8rem 0;
            border-bottom: 1px solid var(--line-soft);
            color: inherit;
            transition: opacity 0.2s;
        }
        .post:last-child { border-bottom: none; }
        .post:hover { opacity: 0.72; }
        .post:hover .post-title { color: var(--accent); }
        .post-date {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            padding-top: 0.45rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .post-body { min-width: 0; }
        .post-title {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.15rem, 2vw, 1.42rem);
            font-weight: 700;
            color: var(--ink);
            line-height: 1.3;
            letter-spacing: -0.018em;
            margin-bottom: 0.5rem;
            transition: color 0.2s;
        }
        .post-excerpt {
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            font-style: italic;
            color: var(--muted);
            line-height: 1.7;
            font-weight: 400;
        }
        .post-empty .post-title {
            font-style: italic;
            font-weight: 400;
            color: var(--muted);
        }

        /* MINI FOOTER — socials + contact */
        .mini-footer {
            background: var(--bg);
            border-top: 1px solid var(--line);
            padding: 1.1rem 1.5rem;
        }
        .mini-footer-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.6rem;
            flex-wrap: wrap;
        }
        .mini-footer .socials { display: flex; align-items: center; gap: 0.9rem; }
        .mini-footer .social-link {
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            transition: color 0.2s, transform 0.15s;
        }
        .mini-footer .social-link:hover { color: var(--accent); transform: translateY(-1px); }
        .mini-footer .social-link svg { width: 17px; height: 17px; display: block; fill: currentColor; }
        .mini-footer .sep { width: 1px; height: 14px; background: var(--line-strong); }
        .mini-footer .contact {
            font-family: 'Inter', sans-serif;
            font-size: 0.74rem;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .mini-footer .contact a {
            color: var(--ink);
            border-bottom: 1px solid var(--line-strong);
            transition: color 0.2s, border-color 0.2s;
        }
        .mini-footer .contact a:hover { color: var(--accent); border-color: var(--accent); }

        /* RESPONSIVE */
        @media (max-width: 760px) {
            .nav { padding: 0.75rem 1.5rem; }
            .nav-logo img { height: 60px; }
            .nav-links {
                display: none;
                position: absolute; top: 100%; left: 0; right: 0;
                background: rgba(251,250,246,0.97);
                backdrop-filter: blur(14px);
                flex-direction: column;
                gap: 0;
                border-bottom: 1px solid var(--line);
                padding: 0;
            }
            .nav-links.open { display: flex; align-items: stretch; }
            .nav-links li { width: 100%; }
            .nav-links li a { display: block; padding: 1rem 1.5rem; text-align: center; }
            .nav-divider { display: none; }
            .nav-off-menu a { padding: 0.7rem 1.5rem; }
            .nav-off-menu img { margin: 0 auto; height: 26px; }
            .nav-menu-btn { display: flex; }
            .page-header { padding: 6.5rem 1.5rem 2.5rem; }
            .archive { padding: 1.5rem 1.5rem 4rem; }
            .post { grid-template-columns: 90px 1fr; gap: 1.2rem; }
            .post-date { font-size: 0.62rem; letter-spacing: 0.16em; padding-top: 0.4rem; }
            .mini-footer-inner { gap: 1rem; }
        }

        /* Display titles in Bricolage Grotesque */
        .page-title,
        .year-head,
        .post-title {
            font-family: 'Bricolage Grotesque', 'Inter', sans-serif !important;
        }
    </style>
</head>

<script>
    document.getElementById('menu-btn').addEventListener('click', () => {
        document.getElementById('nav-links').classList.toggle('open');
    });
    document.querySelectorAll('#nav-links a').forEach(l => {
        l.addEventListener('click', () => document.getElementById('nav-links').classList.remove('open'));
    });

    const nav = document.getElementById('main-nav');
    const FADE_START = 80;
    const FADE_END = 360;
    window.addEventListener('scroll', () => {
        const y = window.scrollY;
        let op = 1;
        if (y > FADE_START) op = Math.max(0, 1 - (y - FADE_START) / (FADE_END - FADE_START));
        nav.style.opacity = op;
        nav.style.pointerEvents = op < 0.08 ? 'none' : 'auto';
    }, { passive: true });
</script>
